name: generate arcade contribution graphs

on:
  schedule: # roda automaticamente a cada 24 horas
    - cron: "0 */24 * * *"
  workflow_dispatch: # permite rodar manualmente
  push: # roda em cada push na branch main
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: generate contribution graph SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          # Lista de jogos habilitados
          games: 'pacman,bomberman,breakout'
      - name: push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
